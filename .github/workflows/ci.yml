name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: cfs
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: cfs/pnpm-lock.yaml
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Type check
        run: pnpm build
        # TypeScript not installed - rely on build for type checking

      - name: Run unit tests
        run: pnpm test -- --run
      
      - name: Run E2E tests
        run: pnpm test:e2e -- --reporter=list
        if: github.event_name == 'push'