schema: spec-driven

context: |
  Project: CFS - Comisión de Fiestas de Seno
  Domain: seno.didtor.dev (subdomain)
  Stack: Vite + React (frontend), Fastify + TypeScript (backend), GraphQL + codegen, SQLite
  Architecture: Monorepo (client/server en el mismo repo)
  Style: Minimal Dark Luxury
  Auth: JWT con roles (admin, staff)
  Deployment: Caddy reverse proxy
  Types: TypeScript end-to-end con auto-generated types (GraphQL codegen)
  Language: Code/commits/docs in English; Web UI in Spanish

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  test_runner: vitest
  note: "TDD strict mode enabled — Vitest + Playwright"

  frontend:
    unit: vitest
    e2e: playwright
    coverage: pnpm vitest --coverage

  backend:
    unit: vitest
    integration: vitest + supertest
    coverage: pnpm vitest --coverage

  layers:
    - Unit (frontend + backend resolvers)
    - Integration (GraphQL mutations, auth flow)
    - E2E (login, reservation, CRUD flows)

  commands:
    test: "pnpm test"
    test:e2e: "pnpm test:e2e"
    coverage: "pnpm vitest --coverage"