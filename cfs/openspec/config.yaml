schema: spec-driven

context: |
  Tech stack: React 19 + Vite (client), Fastify 5 + Mercurius GraphQL + better-sqlite3 (server), pnpm monorepo
  Architecture: SPA frontend with GraphQL API (urql client), shared @cfs/types package
  Testing: Vitest 4 (unit), @testing-library (integration), Playwright (E2E)
  Style: ESLint 9 + Prettier 3, TypeScript strict mode

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  test_runner:
    command: "vitest run"
    framework: vitest
  layers:
    unit:
      available: true
      tool: vitest
    integration:
      available: true
      tool: "@testing-library/react, @testing-library/jest-dom"
    e2e:
      available: true
      tool: "@playwright/test"
  coverage:
    available: true
    command: "vitest run --coverage"
  quality:
    linter:
      available: true
      command: "eslint ."
    type_checker:
      available: true
      command: "tsc --noEmit"
    formatter:
      available: true
      command: "prettier . --check"