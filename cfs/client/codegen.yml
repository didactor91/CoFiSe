schema:
  - http://localhost:4000/graphql
  - ./src/graphql/schema.ts

documents:
  - ./src/graphql/**/*.ts

generates:
  ../packages/types/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withComponent: true
      withHOC: false
      withHooks: true
      enumsAsTypes: true
      scalarTypeNames:
        DateTime: string